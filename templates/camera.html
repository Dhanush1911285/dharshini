<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Delulu Snapcam</title>

<style>
/* RESET */
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: black;
}

/* CAMERA FULLSCREEN */
#camera {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* TOP BAR */
.top-bar {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    color: white;
    z-index: 2;
}

/* BOTTOM CONTROLS */
.bottom-bar {
    position: fixed;
    bottom: 20px;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 2;
}

/* CAPTURE BUTTON */
#capture {
    width: 75px;
    height: 75px;
    border-radius: 50%;
    border: 5px solid white;
    background: rgba(255,255,255,0.1);
    cursor: pointer;
}

/* SIDE BUTTONS */
.side-controls {
    position: fixed;
    right: 15px;
    top: 40%;
    display: flex;
    flex-direction: column;
    gap: 20px;
    z-index: 2;
}

.side-controls button {
    background: rgba(0,0,0,0.5);
    border: none;
    color: white;
    padding: 10px;
    border-radius: 50%;
    cursor: pointer;
}

/* PREVIEW IMAGE */
#preview {
    position: fixed;
    top: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
    z-index: 3;
}

/* ACTION BUTTONS AFTER CAPTURE */
.preview-actions {
    position: fixed;
    bottom: 30px;
    width: 100%;
    display: none;
    justify-content: space-around;
    z-index: 4;
}

.preview-actions button {
    padding: 12px 20px;
    border: none;
    border-radius: 20px;
    font-size: 16px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- CAMERA -->
<video id="camera" autoplay playsinline></video>

<!-- PREVIEW -->
<img id="preview">

<!-- TOP BAR -->
<div class="top-bar">
    <div>Delulu Snapcam 😏</div>
    <div><a href="/logout" style="color:white;">Logout</a></div>
</div>

<!-- SIDE BUTTONS -->
<div class="side-controls">
    <button onclick="flipCamera()">🔄</button>
    <button onclick="toggleFlash()">⚡</button>
</div>

<!-- CAPTURE BUTTON -->
<div class="bottom-bar">
    <button id="capture"></button>
</div>

<!-- AFTER CAPTURE -->
<div class="preview-actions" id="actions">
    <button onclick="retake()">Retake</button>
    <button onclick="saveImage()">Save</button>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
let video = document.getElementById("camera");
let canvas = document.getElementById("canvas");
let preview = document.getElementById("preview");
let actions = document.getElementById("actions");

let currentStream;
let usingFront = true;

/* START CAMERA */
async function startCamera() {
    if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
    }

    const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: usingFront ? "user" : "environment" }
    });

    currentStream = stream;
    video.srcObject = stream;
}

startCamera();

/* CAPTURE */
document.getElementById("capture").onclick = () => {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext("2d");
    ctx.drawImage(video, 0, 0);

    const imageData = canvas.toDataURL("image/png");

    preview.src = imageData;
    preview.style.display = "block";
    actions.style.display = "flex";
};

/* RETAKE */
function retake() {
    preview.style.display = "none";
    actions.style.display = "none";
}

/* SAVE (SEND TO FLASK) */
function saveImage() {
    const imageData = canvas.toDataURL("image/png");

    fetch("/upload", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ image: imageData })
    })
    .then(res => res.json())
    .then(data => {
        alert("Saved 😏");
        retake();
    });
}

/* SWITCH CAMERA */
function flipCamera() {
    usingFront = !usingFront;
    startCamera();
}

/* FLASH (dummy for now) */
function toggleFlash() {
    alert("Flash coming soon 😏");
}
</script>

</body>
</html>
