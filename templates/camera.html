<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Delulu Snapcam</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/camera.css', v=1) }}">
</head>
<body>
    <div class="camera-app">
        <video id="camera" autoplay playsinline muted></video>
        <canvas id="camera-canvas"></canvas>
        <img id="preview" alt="Captured preview">

        <div class="camera-overlay top-fade"></div>
        <div class="camera-overlay bottom-fade"></div>

        <header class="top-bar">
            <div>
                <div class="brand-label">Delulu Snapcam</div>
                <div class="filter-title" id="active-filter-name">Normal</div>
            </div>
            <a class="logout-link" href="{{ url_for('logout') }}">Logout</a>
        </header>

        <div id="status" class="status-pill">Loading camera...</div>

        <div class="side-controls">
            <button type="button" id="flip-btn">Flip</button>
            <button type="button" id="retake-btn">Retake</button>
        </div>

        <section class="filter-bar-shell">
            <div class="filter-bar" id="filter-bar">
                <button class="filter-chip active" data-filter="normal" onclick="alert('JS not loaded')">Normal</button>
                <button class="filter-chip" data-filter="grayscale" onclick="alert('JS not loaded')">Grayscale</button>
                <button class="filter-chip" data-filter="sepia" onclick="alert('JS not loaded')">Sepia</button>
                <button class="filter-chip" data-filter="contrast" onclick="alert('JS not loaded')">Contrast</button>
                <button class="filter-chip" data-filter="bright" onclick="alert('JS not loaded')">Bright</button>
                <button class="filter-chip" data-filter="cool" onclick="alert('JS not loaded')">Cool</button>
                <button class="filter-chip" data-filter="warm" onclick="alert('JS not loaded')">Warm</button>
                <button class="filter-chip" data-filter="blur" onclick="alert('JS not loaded')">Blur</button>
                <button class="filter-chip" data-filter="vintage" onclick="alert('JS not loaded')">Vintage</button>
                <button class="filter-chip" data-filter="mono" onclick="alert('JS not loaded')">Mono</button>
                <button class="filter-chip ai-chip" data-filter="dog" onclick="alert('JS not loaded')">Dog AI</button>
                <button class="filter-chip ai-chip" data-filter="cat" onclick="alert('JS not loaded')">Cat AI</button>
                <button class="filter-chip ai-chip" data-filter="glasses" onclick="alert('JS not loaded')">Glasses AI</button>
                <button class="filter-chip ai-chip" data-filter="crown" onclick="alert('JS not loaded')">Crown AI</button>
                <button class="filter-chip ai-chip" data-filter="mask" onclick="alert('JS not loaded')">Mask AI</button>
            </div>
        </section>

        <div class="bottom-bar">
            <button type="button" id="capture">Capture</button>
            <button type="button" id="save-btn">Save</button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/camera.js', v=1) }}"></script>
</body>
</html>
